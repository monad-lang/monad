<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Monad REPL</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <header>
      <h1>Monad REPL</h1>
      <div id="status">Loading...</div>
    </header>
    
    <main>
      <div id="editor-container">
        <textarea id="code" spellcheck="false" placeholder="Enter code here...
use init

def main (args : List String) : I64 := 42"></textarea>
        <div id="line-numbers"></div>
      </div>
      
      <div id="controls">
        <button id="run" disabled>Run</button>
        <button id="clear">Clear</button>
      </div>
      
      <div id="output-container">
        <h2>Output</h2>
        <pre id="output"></pre>
      </div>
      
      <div id="examples">
        <h2>Examples</h2>
        <button class="example-btn" data-example="use init&#10;&#10;def x : I64 := 42&#10;&#10;def main (args : List String) : I64 := x">x : I64 := 42</button>
        <button class="example-btn" data-example="use init&#10;use math&#10;&#10;def add (x : I64) (y : I64) : I64 := x + y&#10;&#10;def main (args : List String) : I64 := add 1 2">add (x : I64) (y : I64)</button>
        <button class="example-btn" data-example="use init&#10;use math&#10;&#10;def factorial (n : I64) : I64 :=&#10;  if n == 0&#10;  then 1&#10;  else n * factorial (n - 1)&#10;&#10;def main (args : List String) : I64 := factorial 5">factorial</button>
        <button class="example-btn" data-example="use init&#10;&#10;def is_empty (self : List A) : Bool :=&#10;  match self {&#10;    empty => true,&#10;    cons a tail => false&#10;  }&#10;&#10;def main (args : List String) : Bool := is_empty (List.cons 1 (List.cons 2 List.empty))">list is_empty</button>
        <button class="example-btn" data-example="use init&#10;&#10;def first (self : List A) : Option A :=&#10;  match self {&#10;    empty => none,&#10;    cons a tail => some a&#10;  }&#10;&#10;def main (args : List String) : Option I64 := first (List.cons 42 List.empty)">list first</button>
        <button class="example-btn" data-example="use io&#10;open IO&#10;&#10;def main (args : List String) : IO Unit :=&#10;  println &quot;Hello, World!&quot;">hello world</button>
      </div>
    </main>
  </div>
  
  <script type="module" src="main.js"></script>
</body>
</html>
